<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fresh Fruit Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🍓 Fresh Fruit Shop</h1>
    <p>Fresh • Healthy • Delivered</p>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="container">

    <!-- PRODUCTS -->
    <main class="products">
      <h2>Our Fruits</h2>

      <div class="card">
        <h3>🍎 Apples</h3>
        <p>Crisp and fresh apples.</p>
        <span class="price">$2</span>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <h3>🍌 Bananas</h3>
        <p>Sweet and full of energy.</p>
        <span class="price">$1</span>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <h3>🍇 Grapes</h3>
        <p>Juicy and delicious.</p>
        <span class="price">$3</span>
        <button>Add to Cart</button>
      </div>

    </main>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>🛒 Cart</h2>
      <p>Your cart is empty</p>

      <h3>📞 Contact</h3>
      <p>Email: fruitshop@email.com</p>
    </aside>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 Fresh Fruit Shop</p>
  </footer>

</body>
</html>
